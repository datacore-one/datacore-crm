name: crm
version: 0.2.0
description: |
  Network Intelligence for Datacore.
  Track entities (people, companies, projects, events), relationships, and industry landscape.
  Capture from research, journals, calendar. Surface strategic insights in workflows.
  Support relationship lifecycle from discovery to partnership.

author: datacore
repository: https://github.com/datacore-one/datacore-crm
license: MIT

dependencies:
  - core@>=1.0.0

optional:
  - gtd          # Enhanced task integration
  - nightshift   # Automated daily scans and maintenance
  - mail         # Email interaction capture
  - meeting-notes # Meeting interaction capture

provides:
  commands:
    - crm        # Single conversational command for all CRM operations

  agents:
    - crm-interaction-extractor  # Extract interactions from journals/calendar
    - crm-relationship-scorer    # Calculate relationship health scores
    - crm-entity-extractor       # Extract entities from research/literature
    - crm-contact-maintainer     # Dedup, merge, validate contacts

  templates:
    - contacts/                  # Contacts folder structure
    - landscape/                 # Industry landscape templates

  crm_adapters:
    - journal    # Built-in: extract [[Contact]] wiki-links from journals
    - calendar   # Built-in: extract attendees from calendar.org

settings:
  scan_days_default:
    description: "Default journal scan range in days"
    default: 7

  dormant_threshold_days:
    description: "Days without interaction before marked dormant"
    default: 60

  auto_scan_enabled:
    description: "Enable automatic journal/calendar scans on /today"
    default: true

  relationship_score_weights:
    description: "Weights for relationship score calculation"
    default:
      recency: 0.4
      frequency: 0.3
      depth: 0.2
      reciprocity: 0.1

  entity_extraction:
    description: "Entity extraction settings"
    default:
      auto_create_drafts: false
      min_confidence: 0.7

  maintenance:
    description: "Contact maintenance settings"
    default:
      weekly_maintenance: true
      stale_threshold_days: 180

hooks:
  today: "commands/today-hook.md"
  weekly_review: "commands/weekly-hook.md"
  nightshift_queue: "commands/nightshift-hook.md"
  research_complete: "commands/research-hook.md"
  post_install: |
    echo "CRM module installed."
    echo ""
    echo "Quick start:"
    echo "  1. Run /crm to get started"
    echo "  2. Create contacts in [space]/contacts/"
    echo "  3. Mention contacts as [[Name]] in journals"
    echo ""
    echo "Contacts folder structure:"
    echo "  [space]/contacts/"
    echo "    ├── _index.md"
    echo "    ├── people/"
    echo "    ├── companies/"
    echo "    ├── projects/"
    echo "    ├── events/"
    echo "    └── landscape/"

use_cases:
  - Track professional relationships across personal and team spaces
  - Auto-extract interactions from daily journals and calendar
  - Extract entities from research articles and literature notes
  - Build industry landscape for strategic analysis
  - Track relationship evolution from discovery to partnership
  - Prepare for trips/conferences with relevant contact briefings
  - Surface follow-up opportunities in /today briefing
  - Review relationship health in weekly reviews
  - Stage contacts from personal to team space when formalized
  - Identify competitors and market positioning

related_dips:
  - DIP-0002  # Layered context for cross-space index
  - DIP-0009  # GTD integration (:CRM: tag)
  - DIP-0010  # External sync adapter pattern
  - DIP-0012  # CRM Module specification
